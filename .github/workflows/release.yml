name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    strategy:
      matrix:
        include:
          - { target: linux-64, os: ubuntu-latest }
          - { target: osx-arm64, os: macos-latest }
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: prefix-dev/setup-pixi@v0.9.4
      with:
        cache: true
        frozen: true
    - name: Build mojopkg
      run: pixi run build
    - name: Build conda package
      run: pixi build
    - name: Upload to prefix.dev
      run: |
        pixi auth login prefix.dev --token "$PREFIX_API_KEY"
        pixi run publish
      env:
        PREFIX_API_KEY: ${{ secrets.MOJO_COMMUNITY_API_TOKEN }}
    - name: Create GitHub release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          package/pontoneer.mojopkg
          output/*/pontoneer-*.conda
        generate_release_notes: ${{ matrix.target == 'linux-64' }}
