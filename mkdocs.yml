site_name: pontoneer
site_description: Mojo library providing additional type protocol extensions for Python interop.
site_url: https://winding-lines.github.io/pontoneer/
repo_url: https://github.com/winding-lines/pontoneer
repo_name: winding-lines/pontoneer

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: .
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API Reference:
    - Overview: api.md
    - BufferProtocolBuilder: api/buffer.md
    - MappingProtocolBuilder: api/mapping.md
    - NumberProtocolBuilder: api/number.md
    - SequenceProtocolBuilder: api/sequence.md
  - Changelog: changelog.md
